name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to redeploy'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - web
          - public
          - all
      action:
        description: 'Action'
        required: true
        default: 'redeploy'
        type: choice
        options:
          - redeploy
          - logs

concurrency:
  group: railway-deploy
  cancel-in-progress: false

env:
  RAILWAY_PROJECT_ID: 6fbf7793-fe4e-4225-82c0-54defd227c2c
  RAILWAY_ENVIRONMENT_NAME: production

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.service || 'api' }}
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Verify RAILWAY_TOKEN secret
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set. Add an account token at https://railway.com/account/tokens, then repo Settings -> Secrets and variables -> Actions -> New secret named RAILWAY_TOKEN."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Resolve target services
        id: targets
        run: |
          SVC="${{ github.event.inputs.service || 'api' }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Auto-deploys on push only redeploy the api (backend behavior
            # changes). Static sites can be redeployed manually via dispatch.
            SVC="api"
          fi
          if [ "$SVC" = "all" ]; then
            echo "services=api web public" >> "$GITHUB_OUTPUT"
          else
            echo "services=$SVC" >> "$GITHUB_OUTPUT"
          fi

      - name: Redeploy services
        if: ${{ github.event.inputs.action != 'logs' }}
        run: |
          set -e
          for svc in ${{ steps.targets.outputs.services }}; do
            echo "::group::Link + redeploy $svc"
            railway link \
              --project "$RAILWAY_PROJECT_ID" \
              --environment "$RAILWAY_ENVIRONMENT_NAME" \
              --service "$svc"
            railway redeploy --service "$svc" --yes
            echo "::endgroup::"
          done

      - name: Tail build + deployment logs
        if: ${{ always() }}
        run: |
          for svc in ${{ steps.targets.outputs.services }}; do
            railway link \
              --project "$RAILWAY_PROJECT_ID" \
              --environment "$RAILWAY_ENVIRONMENT_NAME" \
              --service "$svc" || continue

            echo "::group::Build logs: $svc"
            railway logs \
              --service "$svc" \
              --environment "$RAILWAY_ENVIRONMENT_NAME" \
              --build \
              --lines 300 2>&1 || echo "(no build logs available)"
            echo "::endgroup::"

            echo "::group::Deployment logs: $svc"
            railway logs \
              --service "$svc" \
              --environment "$RAILWAY_ENVIRONMENT_NAME" \
              --deployment \
              --lines 300 2>&1 || echo "(no deployment logs available)"
            echo "::endgroup::"
          done
