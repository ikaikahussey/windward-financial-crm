name = "voter-match-api"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

# The access-code / admin-code / JWT secret live in .dev.vars locally and
# in `wrangler secret put` for production. See .dev.vars.example.

[[d1_databases]]
binding = "DB"
database_name = "voter_match"
database_id = "REPLACE_WITH_YOUR_D1_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "HASH_INDEX"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

[[r2_buckets]]
binding = "VOTER_FILES"
bucket_name = "voter-match-files"
preview_bucket_name = "voter-match-files-preview"

[vars]
COOKIE_NAME = "vm_session"
COOKIE_DOMAIN = ""
